<!DOCTYPE html>
<html>
<head>
    <title>Timetable Preview</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(to right, #4e73df, #1cc88a);
            margin: 0;
            padding: 40px;
        }

        .container {
            background: white;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0px 10px 25px rgba(0,0,0,0.2);
            max-width: 1000px;
            margin: auto;
            text-align: center;
        }

        h2 {
            color: #333;
            margin-bottom: 10px;
        }

        h3 {
            color: #555;
            margin-bottom: 20px;
        }

        table {
            border-collapse: collapse;
            width: 100%;
            margin-top: 20px;
        }

        th, td {
            padding: 10px;
            border: 1px solid #ddd;
            text-align: center;
        }

        th {
            background-color: #4e73df;
            color: white;
        }

        tr:nth-child(even) {
            background-color: #f9f9f9;
        }

        .btn {
            margin-top: 25px;
            background-color: #1cc88a;
            color: white;
            border: none;
            padding: 14px 30px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 16px;
            font-weight: bold;
        }

        .btn:hover {
            background-color: #17a673;
        }
    </style>
</head>

<body>

<div class="container">

    <h2>📅 Timetable Preview</h2>
    <h3>Structured Output</h3>

    <!-- TABLE -->
    {{ table|safe }}

    <!-- CONFIRM BUTTON -->
    <form action="/confirm" method="post">
        <button class="btn">✔ Confirm & Download</button>
    </form>

</div>

</body>
</html>
