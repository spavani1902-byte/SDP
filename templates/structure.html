<!DOCTYPE html>
<html>
<head>
    <title>Define Structure</title>

    <style>
        body {
            font-family: Arial;
            background: linear-gradient(to right, #4e73df, #1cc88a);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .container {
            background: white;
            padding: 30px;
            border-radius: 10px;
            width: 400px;
            text-align: center;
            box-shadow: 0px 10px 25px rgba(0,0,0,0.2);
        }

        input {
            width: 80%;
            padding: 10px;
            margin: 10px;
        }

        button {
            padding: 10px 20px;
            background: #4e73df;
            color: white;
            border: none;
            border-radius: 5px;
        }
    </style>
</head>

<body>

<div class="container">

    <h2>Define Structure</h2>

    <form action="/headings" method="post">
        <input type="number" name="main_count" placeholder="Number of Main Headings" required>
        <input type="number" name="sub_count" placeholder="Number of Sub Headings" required>
        <button type="submit">Next</button>
    </form>

</div>

</body>
</html>
