<!DOCTYPE html>
<html>
<head>
    <title>Enter Headings</title>

    <style>
        body {
            font-family: Arial;
            background: linear-gradient(to right, #4e73df, #1cc88a);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .container {
            background: white;
            padding: 30px;
            border-radius: 10px;
            width: 450px;
            text-align: center;
            box-shadow: 0px 10px 25px rgba(0,0,0,0.2);
        }

        input {
            width: 80%;
            padding: 10px;
            margin: 8px;
        }

        button {
            padding: 10px 20px;
            background: #4e73df;
            color: white;
            border: none;
            border-radius: 5px;
        }
    </style>
</head>

<body>

<div class="container">

    <h2>Enter Heading Names</h2>

    <form action="/submit_headings" method="post">
        <h3>Main Headings</h3>

        {% for i in range(main_count) %}
            <input type="text" name="main_heading_{{i}}"placeholder="Main Heading {{i+1}}" required>
        {% endfor %}

        <h3>Sub Headings</h3>

        {% for i in range(sub_count) %}
            <input type="text" name="sub_heading_{{i}}" placeholder="Sub Heading {{i+1}}" required>
        {% endfor %}

        <br><br>
        <button type="submit">Submit</button>

    </form>

</div>

</body>
</html>
