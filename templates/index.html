<!DOCTYPE html>
<html>
<head>
    <title>Document Processing System</title>

    <!-- Font Awesome for icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

    <style>
        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(to right, #4e73df, #1cc88a);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
        }

        .container {
            background: white;
            padding: 40px;
            border-radius: 15px;
            box-shadow: 0px 12px 30px rgba(0,0,0,0.25);
            text-align: center;
            width: 520px;
        }

        h2 {
            margin-bottom: 25px;
            color: #333;
        }

        .section {
            margin: 18px 0;
            padding: 18px;
            border: 1px solid #ddd;
            border-radius: 10px;
            transition: 0.3s;
        }

        .section:hover {
            background-color: #f8f9fc;
            transform: scale(1.02);
        }

        .label {
            font-weight: bold;
            display: block;
            margin-bottom: 10px;
            font-size: 16px;
        }

        input[type="file"] {
            width: 90%;
            padding: 6px;
        }

        button {
            margin-top: 25px;
            background-color: #4e73df;
            color: white;
            border: none;
            padding: 12px 35px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 16px;
            transition: 0.3s;
        }

        button:hover {
            background-color: #2e59d9;
        }

        .note {
            font-size: 13px;
            color: #666;
            margin-top: 10px;
        }

        /* ICON COLORS */
        .pdf-icon { color: #e74a3b; }
        .word-icon { color: #2b579a; }
        .excel-icon { color: #1cc88a; }

        .icon {
            margin-right: 8px;
        }
    </style>
</head>

<body>
<div class="container">

    <h2>📄 Document Processing System</h2>

    <form id="uploadForm" action="/module" method="post" enctype="multipart/form-data">

        <!-- PDF -->
        <div class="section">
            <label class="label">
                <i class="fa-solid fa-file-pdf pdf-icon icon"></i> Upload PDF
            </label>
            <input type="file" id="pdf" accept=".pdf">
        </div>

        <!-- WORD -->
        <div class="section">
            <label class="label">
                <i class="fas fa-file-word word-icon icon"></i> Upload Word
            </label>
            <input type="file" id="word" accept=".doc,.docx">
        </div>

        <!-- EXCEL -->
        <div class="section">
            <label class="label">
                <i class="fas fa-file-excel excel-icon icon"></i> Upload Excel
            </label>
            <input type="file" id="excel" accept=".xls,.xlsx">
        </div>

        <!-- FINAL INPUT -->
        <input type="file" name="file" id="finalFile" style="display:none">

        <div class="note">
            Upload ONLY one file (PDF / Word / Excel)
        </div>

        <button type="submit">Next</button>

    </form>

</div>

<script>
document.getElementById("uploadForm").addEventListener("submit", function(e) {

    let pdf = document.getElementById("pdf").files[0];
    let word = document.getElementById("word").files[0];
    let excel = document.getElementById("excel").files[0];

    let finalInput = document.getElementById("finalFile");

    if (pdf) {
        setFile(finalInput, pdf);
    } else if (word) {
        setFile(finalInput, word);
    } else if (excel) {
        setFile(finalInput, excel);
    } else {
        alert("❌ Please upload a file");
        e.preventDefault();
    }

});

function setFile(input, file) {
    const dt = new DataTransfer();
    dt.items.add(file);
    input.files = dt.files;
}
</script>

</body>
</html>
