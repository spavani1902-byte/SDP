<!DOCTYPE html>
<html>
<head>
    <title>Document Processing System</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(to right, #4e73df, #1cc88a);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
        }

        .container {
            background: white;
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0px 10px 25px rgba(0,0,0,0.2);
            text-align: center;
            width: 500px;
        }

        h2 {
            margin-bottom: 20px;
            color: #333;
        }

        .section {
            margin: 15px 0;
            padding: 15px;
            border: 1px solid #ddd;
            border-radius: 8px;
        }

        .section:hover {
            background-color: #f9f9f9;
        }

        input[type="file"] {
            width: 90%;
            padding: 8px;
        }

        button {
            margin-top: 20px;
            background-color: #4e73df;
            color: white;
            border: none;
            padding: 12px 30px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 16px;
        }

        button:hover {
            background-color: #2e59d9;
        }

        .note {
            font-size: 13px;
            color: #666;
        }

        .label {
            font-weight: bold;
            display: block;
            margin-bottom: 8px;
        }
    </style>
</head>

<body>
<div class="container">

    <h2>📄 Document Processing System</h2>

    <form id="uploadForm" action="/module" method="post" enctype="multipart/form-data">

        <!-- PDF -->
        <div class="section">
            <label class="label">📕 Upload PDF</label>
            <input type="file" id="pdf">
        </div>

        <!-- WORD -->
        <div class="section">
            <label class="label">📘 Upload Word</label>
            <input type="file" id="word">
        </div>

        <!-- EXCEL -->
        <div class="section">
            <label class="label">📗 Upload Excel</label>
            <input type="file" id="excel">
        </div>

        <!-- REAL INPUT (for backend) -->
        <input type="file" name="file" id="finalFile" style="display:none">

        <div class="note">
            Upload ONLY one file (PDF / Word / Excel)
        </div>

        <button type="submit">Next</button>

    </form>

</div>

<script>
document.getElementById("uploadForm").addEventListener("submit", function(e) {

    let pdf = document.getElementById("pdf").files[0];
    let word = document.getElementById("word").files[0];
    let excel = document.getElementById("excel").files[0];

    let finalInput = document.getElementById("finalFile");

    if (pdf) {
        setFile(finalInput, pdf);
    } else if (word) {
        setFile(finalInput, word);
    } else if (excel) {
        setFile(finalInput, excel);
    } else {
        alert("❌ Please upload a file");
        e.preventDefault();
    }

});

function setFile(input, file) {
    const dt = new DataTransfer();
    dt.items.add(file);
    input.files = dt.files;
}
</script>

</body>
</html>
