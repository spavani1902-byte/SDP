<!DOCTYPE html>
<html>
<head>
    <title>Document Processing System</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(to right, #4e73df, #1cc88a);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .container {
            background: white;
            padding: 40px;
            border-radius: 12px;
            width: 450px;
            box-shadow: 0px 10px 25px rgba(0,0,0,0.2);
            text-align: center;
        }

        h2 {
            color: #333;
        }

        select {
            padding: 10px;
            width: 90%;
            margin-top: 15px;
        }

        button {
            margin-top: 20px;
            padding: 12px 30px;
            background-color: #4e73df;
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
        }

        button:hover {
            background-color: #2e59d9;
        }

        .file-info {
            margin-top: 15px;
            font-size: 14px;
            color: #555;
        }
    </style>
</head>

<body>
    <div class="container">

        <h2>📄 Select Module</h2>

        <!-- Show uploaded file -->
        <div class="file-info">
            <strong>Uploaded File:</strong><br>
            {{ file_path }}
        </div>

        <form action="/process" method="post">

            <!-- Hidden file path -->
            <input type="hidden" name="file_path" value="{{ file_path }}">

            <br>

            <label>Select Module:</label><br>

            <select name="module" required>
                <option value="">-- Select --</option>
                <option value="iqac">IQAC</option>
                <option value="committees">Committees</option>
                <option value="timetable">Timetable</option>
            </select>

            <br>

            <button type="submit">Process</button>

        </form>

    </div>
</body>
</html>
