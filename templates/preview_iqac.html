<!DOCTYPE html>
<html>
<head>
    <title>IQAC Preview</title>

    <style>
        body {
            font-family: Arial;
            background: linear-gradient(to right, #4e73df, #1cc88a);
            padding: 40px;
        }

        .container {
            background: white;
            padding: 30px;
            border-radius: 10px;
            max-width: 900px;
            margin: auto;
            text-align: center;
        }

        table {
            border-collapse: collapse;
            width: 100%;
            margin-top: 20px;
        }

        th, td {
            border: 1px solid #ddd;
            padding: 10px;
        }

        th {
            background: #4e73df;
            color: white;
        }

        button {
            margin-top: 20px;
            padding: 10px 20px;
            background: #1cc88a;
            color: white;
            border: none;
            cursor: pointer;
            border-radius: 5px;
        }

        button:hover {
            background: #17a673;
        }
    </style>
</head>

<body>

<div class="container">

<h2>📊 IQAC Preview</h2>

<table>
<tr>
    {% for col in columns %}
        <th>{{ col }}</th>
    {% endfor %}
</tr>

{% for row in rows %}
<tr>
    {% for col in columns %}
        <td>{{ row[col] }}</td>
    {% endfor %}
</tr>
{% endfor %}
</table>
<!-- SAVE -->
<form action="/final" method="POST">
    <button>✔ Confirm & Download</button>
</form>



</div>

</body>
</html>
