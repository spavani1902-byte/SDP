<!DOCTYPE html>
<html>
<head>
    <title>Preview</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(to right, #4e73df, #1cc88a);
            margin: 0;
            padding: 20px;
        }

        .container {
            background: white;
            padding: 30px;
            border-radius: 12px;
            max-width: 1200px;
            width: 95%;
            margin: auto;
            box-shadow: 0px 10px 25px rgba(0,0,0,0.2);
        }

        h2 {
            text-align: center;
            color: #333;
        }

        h3 {
            text-align: center;
            color: #555;
        }

        /* Table styling */
        .table-container {
            overflow-x: auto;
            margin-top: 20px;
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        table, th, td {
            border: 1px solid #ccc;
        }

        th {
            background-color: #4e73df;
            color: white;
            padding: 10px;
        }

        td {
            padding: 8px;
            text-align: center;
            word-wrap: break-word;
            max-width: 200px;
        }

        /* Confirm button styling */
        .btn-container {
            text-align: center;
            margin-top: 30px;
        }

        .confirm-btn {
            background: linear-gradient(to right, #ff7e5f, #feb47b);
            color: white;
            border: none;
            padding: 15px 35px;
            font-size: 18px;
            font-weight: bold;
            border-radius: 8px;
            cursor: pointer;
            box-shadow: 0px 5px 15px rgba(0,0,0,0.3);
            transition: 0.3s;
        }

        .confirm-btn:hover {
            transform: scale(1.05);
            box-shadow: 0px 8px 20px rgba(0,0,0,0.4);
        }
    </style>
</head>

<body>

<div class="container">

    <h2>📄 Preview</h2>

    <!-- Module Title -->
    {% if module == "iqac" %}
        <h3>IQAC Output</h3>
    {% elif module == "committees" %}
        <h3>Committees List</h3>
    {% endif %}

    <!-- Table Preview -->
    <div class="table-container">
        {{ table|safe }}
    </div>

    <!-- Confirm Button -->
    <div class="btn-container">
        <form action="/confirm" method="post">

            <input type="hidden" name="table_name" value="{{ table_name }}">
            <input type="hidden" name="module" value="{{ module }}">
            <input type="hidden" name="file_path" value="{{ file_path }}">

            <button class="confirm-btn" type="submit">
                ✅ Confirm & Download
            </button>

        </form>
    </div>

</div>

</body>
</html>
