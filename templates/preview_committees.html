<!DOCTYPE html>
<html>
<head>
    <title>Preview</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(to right, #4e73df, #1cc88a);
            margin: 0;
            padding: 20px;
        }

        .container {
            background: white;
            padding: 30px;
            border-radius: 12px;
            max-width: 1200px;
            width: 95%;
            margin: auto;
            box-shadow: 0px 10px 25px rgba(0,0,0,0.2);
        }

        h2, h3 {
            text-align: center;
        }

        .table-container {
            overflow-x: auto;
            margin-top: 20px;
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        th, td {
            border: 1px solid #ccc;
            padding: 10px;
            text-align: center;
        }

        th {
            background-color: #4e73df;
            color: white;
        }

        .btn-container {
            text-align: center;
            margin-top: 30px;
        }

        .confirm-btn {
            background: linear-gradient(to right, #ff7e5f, #feb47b);
            color: white;
            border: none;
            padding: 15px 35px;
            font-size: 18px;
            border-radius: 8px;
            cursor: pointer;
        }

        .confirm-btn:hover {
            transform: scale(1.05);
        }
    </style>
</head>

<body>

<div class="container">

    <h2>📄 Preview</h2>
    <h3>Committees List</h3>

    <!-- TABLE -->
    <div class="table-container">
        <table>

            <!-- HEADERS -->
            <thead>
                <tr>
                    {% if data %}
                        {% for key in data[0].keys() %}
                        <th>{{ key }}</th>
                        {% endfor %}
                    {% endif %}
                </tr>
            </thead>

            <!-- DATA -->
            <tbody>
                {% if data %}
                    {% for row in data %}
                    <tr>
                        {% for value in row.values() %}
                        <td>{{ value }}</td>
                        {% endfor %}
                    </tr>
                    {% endfor %}
                {% else %}
                    <tr>
                        <td colspan="5">No data available</td>
                    </tr>
                {% endif %}
            </tbody>

        </table>
    </div>

    <!-- BUTTON -->
    <div class="btn-container">
        <form action="/confirm" method="post">
            <button class="confirm-btn" type="submit">
                ✅ Confirm & Download
            </button>
        </form>
    </div>

</div>

</body>
</html>
