<!DOCTYPE html>
<html>
<head>
    <title>Result</title>

    <style>
        body {
            font-family: Arial;
            background: linear-gradient(to right, #4e73df, #1cc88a);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .container {
            background: white;
            padding: 30px;
            border-radius: 10px;
            width: 400px;
            text-align: center;
            box-shadow: 0px 10px 25px rgba(0,0,0,0.2);
        }

        ul {
            text-align: left;
        }
    </style>
</head>

<body>

<div class="container">

    <h2>Data Stored Successfully 🎉</h2>

    <h3>Main Headings</h3>
    <ul>
        {% for h in main_headings %}
            <li>{{ h }}</li>
        {% endfor %}
    </ul>

    <h3>Sub Headings</h3>
    <ul>
        {% for h in sub_headings %}
            <li>{{ h }}</li>
        {% endfor %}
    </ul>

</div>

</body>
</html>
